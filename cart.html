<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Queen Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins, sans-serif;
  background:#fff1f6;
  padding:20px;
}

.cart{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.cart-item{
  display:flex;
  align-items:center;
  gap:15px;
  border-bottom:1px solid #eee;
  padding:15px 0;
}

.cart-item img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid #eee;
}

.item-info{
  flex:1;
}

.qty{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.qty button{
  background:#fc2779;
  color:#fff;
  border:none;
  padding:5px 10px;
  border-radius:5px;
  cursor:pointer;
}

.price{
  color:#fc2779;
  font-weight:bold;
}

.remove{
  background:black;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:5px;
  cursor:pointer;
}

.total{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  font-size:20px;
  font-weight:600;
}

.checkout{
  width:100%;
  margin-top:15px;
  padding:12px;
  background:#fc2779;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.empty{
  text-align:center;
  padding:40px;
  color:gray;
}
</style>
</head>

<body>

<div class="cart">
  <h2>🛍 Sky Queen Cart</h2>

  <div id="items"></div>

  <div class="total">
    <span>Total</span>
    <span id="total">₹0</span>
  </div>

  <button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

// 🛒 LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const itemsDiv = document.getElementById("items");
const totalDiv = document.getElementById("total");

// 🛍 RENDER CART
function renderCart(){

  let total = 0;
  itemsDiv.innerHTML = "";

  if(cart.length === 0){
    itemsDiv.innerHTML = `<div class="empty">🛒 Cart is empty</div>`;
    totalDiv.innerText = "₹0";
    return;
  }

  cart.forEach((item,index)=>{

    total += item.price * item.qty;

    itemsDiv.innerHTML += `
      <div class="cart-item">

        <!-- ✅ SAME IMAGE FROM PRODUCT PAGE -->
        <img src="${item.img}" 
             onerror="this.src='images/bangles.png'">

        <div class="item-info">
          <h3>${item.name}</h3>

          <div class="qty">
            <button onclick="changeQty(${index},-1)">-</button>
            <span>${item.qty}</span>
            <button onclick="changeQty(${index},1)">+</button>
          </div>
        </div>

        <div class="price">₹${item.price * item.qty}</div>

        <button class="remove" onclick="removeItem(${index})">X</button>

      </div>
    `;
  });

  totalDiv.innerText = "₹" + total;
}

// ➕➖ QTY
function changeQty(i,val){
  cart[i].qty += val;

  if(cart[i].qty <= 0){
    cart.splice(i,1);
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

// ❌ REMOVE
function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

// 💳 CHECKOUT
function checkout(){

  if(cart.length === 0){
    alert("Cart empty ❌");
    return;
  }

  let total = 0;
  cart.forEach(i => total += i.price * i.qty);

  var options = {
      key: "rzp_test_ShgmffSoB7a2f2",
      amount: total * 100,
      currency: "INR",
      name: "Sky Queen",
      description: "Order Payment",

      handler: function (){
        alert("Payment Successful ✅");
        localStorage.removeItem("cart");
        location.reload();
      }
  };

  new Razorpay(options).open();
}

// 🚀 INIT
renderCart();

</script>

</body>
</html>
