<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Queen | Jewellery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

:root{
--primary:#fc2779;
--dark:#111;
--bg:#fafafa;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:var(--bg);color:var(--dark);}

/* HEADER */
header{
background:#fff;
padding:16px 6%;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
z-index:100;
box-shadow:0 2px 12px rgba(0,0,0,.06);
flex-wrap:wrap;
}

.logo img{height:55px;}

/* NAV */
nav ul{
display:flex;
gap:28px;
list-style:none;
}

nav ul li a{
text-decoration:none;
color:#333;
font-weight:500;
position:relative;
padding-bottom:5px;
}

nav ul li a::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:0%;
height:2px;
background:var(--primary);
transition:.3s;
}

nav ul li a:hover{color:var(--primary);}
nav ul li a:hover::after{width:100%;}
nav ul li a.active{color:var(--primary);}
nav ul li a.active::after{width:100%;}

/* MENU */
.menu-btn{display:none;font-size:22px;cursor:pointer;}

/* SEARCH (FIXED CLEAN UI) */
.search-box{
display:flex;
align-items:center;
background:#f5f5f5;
padding:6px 14px;
border-radius:30px;
gap:8px;
width:230px;
border:1px solid #eee;
}

.search-box input{
border:none;
outline:none;
background:transparent;
width:100%;
font-size:13px;
color:#555;
}

.search-box input::placeholder{
color:#999;
font-size:13px;
}

/* ICON */
.icons{position:relative;font-size:20px;}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:var(--primary);
color:#fff;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

/* FILTER */
.filters{
display:flex;
gap:20px;
padding:20px 6%;
flex-wrap:wrap;
}

select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* PRODUCTS */
.container{padding:20px 6%;}

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.card{
background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.08);
position:relative;
transition:.3s;
}

.card:hover{transform:translateY(-6px);}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.info{padding:16px;}

.price{
margin:8px 0;
font-weight:600;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
background:var(--primary);
color:#fff;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

/* QUICK */
.quick{
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:.3s;
}

.card:hover .quick{opacity:1;}

.quick button{
background:#fff;
color:#000;
width:auto;
padding:10px 18px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}

.modal-box{
background:#fff;
padding:20px;
width:320px;
border-radius:16px;
text-align:center;
}

.modal-box img{
width:100%;
height:200px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
.menu-btn{display:block;}

nav{
position:absolute;
top:70px;
left:0;
width:100%;
background:#fff;
max-height:0;
overflow:hidden;
transition:.4s;
}

nav ul{flex-direction:column;padding:20px;}
nav.active{max-height:300px;}

.search-box{display:none;}
.products{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<header>

<div class="logo">
<a href="index.html"><img src="logo.png"></a>
</div>

<i class="fa-solid fa-bars menu-btn" onclick="toggleMenu()"></i>

<nav id="nav">
<ul>
<li><a href="product.html">Makeup</a></li>
<li><a href="jewellery.html" class="active">Jewellery</a></li>
<li><a href="JewelleryBox.html">Organizer Box</a></li>
<li><a href="Gifthamper.html">Gift Hamper</a></li>
</ul>
</nav>

<div class="search-box">
<i class="fa-solid fa-magnifying-glass"></i>
<input type="text" id="searchInput" placeholder="Search jewellery...">
</div>

<div class="icons">
<a href="cart.html">
<i class="fa-solid fa-bag-shopping">
<span class="cart-count" id="cartCount">0</span>
</i>
</a>
</div>

</header>

<!-- FILTER -->
<div class="filters">
<select id="typeFilter">
<option value="all">All Jewellery</option>
<option value="Necklace">Necklace</option>
<option value="Bangles">Bangles</option>
<option value="Ring">Ring</option>
</select>

<select id="priceFilter">
<option value="all">All Prices</option>
<option value="3000">Below ₹3000</option>
<option value="5000">Below ₹5000</option>
<option value="8000">Below ₹8000</option>
</select>
</div>

<div class="container">
<div class="products" id="products"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span onclick="modal.style.display='none'">✕</span>
<img id="mImg">
<h3 id="mTitle"></h3>
<p id="mPrice"></p>
<button id="mAdd">Add to Cart</button>
</div>
</div>

<script>

/* DATA */
const products = [
{name:"Bangles",type:"Bangles",price:3200,img:"Bangles.png"},
{name:"Necklace Set",type:"Necklace",price:7500,img:"bangles1.png"},
{name:"Bangles",type:"Bangles",price:3200,img:"Bangles2.png"},
{name:"Necklace Set",type:"Necklace",price:7500,img:"bangles4.png"},
{name:"Bangles",type:"Bangles",price:3200,img:"Bangles5.png"},
{name:"Necklace Set",type:"Necklace",price:7500,img:"bangles7.png"},
{name:"Bangles",type:"Bangles",price:3200,img:"Bangles8.png"},
{name:"Necklace Set",type:"Necklace",price:7500,img:"bangles9.png"},
{name:"Bangles",type:"Bangles",price:3200,img:"chain1.png"},
{name:"Necklace Set",type:"Necklace",price:7500,img:"chain2.png"},
{name:"Bangles",type:"Bangles",price:3200,img:"chain3.png"},
{name:"Necklace Set",type:"Necklace",price:7500,img:"chain4.png"},
{name:"Bangles",type:"Bangles",price:3200,img:"chain5.png"},
{name:"Necklace Set",type:"Necklace",price:7500,img:"Earing1.png"},
{name:"Bangles",type:"Bangles",price:3200,img:"Earing2.png"},
{name:"Necklace Set",type:"Necklace",price:7500,img:"Earing3.png"},
{name:"Ring Set",type:"Ring",price:8200,img:"Earing4.png"},
{name:"Bangles",type:"Bangles",price:3200,img:"Earing5.png"},
{name:"Necklace Set",type:"Necklace",price:7500,img:"Locket_pic1.jpeg"},
{name:"Bangles",type:"Bangles",price:3200,img:"pendent.png"},
{name:"Necklace Set",type:"Necklace",price:7500,img:"pendent2.png"},
{name:"Bangles",type:"Bangles",price:3200,img:"Earing2.png"}
];

/* SINGLE declaration (FIXED) */
const productsEl = document.getElementById("products");

// CART
function updateCart(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
cartCount.innerText=cart.reduce((s,i)=>s+i.qty,0);
}

// ✅ FIXED ADD TO CART WITH IMAGE
function addToCart(name,price,img){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let item=cart.find(i=>i.name===name);

if(item){item.qty++;}
else{cart.push({name,price,img,qty:1});}

localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

// BUTTON FEEDBACK
function handleAdd(btn,name,price,img){
addToCart(name,price,img);

btn.innerText="Added ✓";
btn.style.background="green";

setTimeout(()=>{
btn.innerText="Add to Cart";
btn.style.background="#fc2779";
},1000);
}

// RENDER
function render(list){
productsEl.innerHTML="";
list.forEach(p=>{
productsEl.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="quick">
<button onclick="openQuick('${p.name}')">Quick View</button>
</div>
<div class="info">
<h4>${p.name}</h4>
<div class="price">₹${p.price}</div>
<button onclick="handleAdd(this,'${p.name}',${p.price},'${p.img}')">
Add to Cart
</button>
</div>
</div>`;
});
}

// FILTER
typeFilter.onchange=applyFilter;
priceFilter.onchange=applyFilter;

function applyFilter(){
let list=[...products];

if(typeFilter.value!=="all")
list=list.filter(p=>p.type===typeFilter.value);

if(priceFilter.value!=="all")
list=list.filter(p=>p.price<=priceFilter.value);

render(list);
}

// SEARCH
searchInput.addEventListener("keyup",()=>{
let q=searchInput.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(q)));
});

// MODAL
let modal=document.getElementById("modal");
let mImg=document.getElementById("mImg");
let mTitle=document.getElementById("mTitle");
let mPrice=document.getElementById("mPrice");
let current=null;

function openQuick(name){
let p=products.find(x=>x.name===name);
current=p;
mImg.src=p.img;
mTitle.innerText=p.name;
mPrice.innerText="₹"+p.price;
modal.style.display="flex";
}

mAdd.onclick=()=>{
addToCart(current.name,current.price,current.img);
modal.style.display="none";
};

// MENU
function toggleMenu(){
nav.classList.toggle("active");
}

// INIT
render(products);
updateCart();

</script>

</body>
</html>
