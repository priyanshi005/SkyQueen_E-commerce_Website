<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Queen | Jewellery Organizer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#fff5f8;padding-top:90px}

/* HEADER */
header{
  background:#fff;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  top:0;left:0;right:0;
  z-index:1000;
  box-shadow:0 6px 20px rgba(0,0,0,.05);
}
.logo{font-size:28px;font-weight:700;color:#e80071}
.icons i{font-size:22px;margin-left:20px;cursor:pointer;position:relative}
.cart-count{
  position:absolute;
  top:-8px;right:-10px;
  background:#e80071;
  color:#fff;
  font-size:12px;
  padding:2px 6px;
  border-radius:50%;
}

/* LAYOUT */
.container{display:flex;gap:30px;padding:40px}
.filter{
  width:240px;
  background:#fff;
  padding:25px;
  border-radius:16px;
}
.products{
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(232,0,113,.15);
  position:relative;
}
.card img{width:100%;height:260px;object-fit:cover}
.tag{
  position:absolute;
  top:14px;left:14px;
  background:#9c27b0;
  color:#fff;
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
}
.wishlist{
  position:absolute;
  top:14px;right:14px;
  font-size:20px;
  cursor:pointer;
}
.wishlist.active{color:#e80071}
.info{padding:18px}
.price{margin:10px 0;font-weight:600}
button{
  width:100%;
  padding:12px;
  background:#e80071;
  border:none;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

/* QUICK VIEW */
.quick{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.55);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:.3s;
}
.card:hover .quick{opacity:1}
.quick button{
  background:#fff;
  color:#000;
  width:auto;
  padding:10px 18px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}
.modal-box{
  background:#fff;
  padding:20px;
  width:340px;
  border-radius:16px;
}
.modal-box img{width:100%;border-radius:12px}
.close{float:right;font-size:20px;cursor:pointer}

/* LOAD MORE */
#loadMore{
  margin:40px auto;
  display:block;
  padding:12px 40px;
  background:#e80071;
  color:#fff;
  border:none;
  border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:900px){.products{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){
  .container{flex-direction:column}
  .products{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
  <div class="logo">Sky Queen</div>
  <div class="icons">
    <i class="fa-regular fa-heart"></i>

    <!-- CART LINK -->
    <a href="cart.html" style="color:inherit;text-decoration:none;position:relative;">
      <i class="fa-solid fa-bag-shopping">
        <span class="cart-count" id="cartCount">0</span>
      </i>
    </a>
  </div>
</header>

<div class="container">
  <div class="filter">
    <h3>Organisers</h3><br>
    <label><input type="checkbox" checked value="Bangles">  Organiser</label><br>
    <label><input type="checkbox" checked value="Necklace"> Necklace</label><br>
    <label><input type="checkbox" checked value="Earrings"> Earrings</label>
  </div>

  <div class="products" id="products"></div>
</div>

<button id="loadMore">Load More</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" onclick="modal.style.display='none'">✕</span>
    <img id="mImg">
    <h3 id="mTitle"></h3>
    <p id="mPrice"></p>
    <button id="mAdd">Add to Cart</button>
  </div>
</div>

<script>
const productsEl = document.getElementById("products");
const cartCountEl = document.getElementById("cartCount");

const modal = document.getElementById("modal");
const mImg = document.getElementById("mImg");
const mTitle = document.getElementById("mTitle");
const mPrice = document.getElementById("mPrice");
const mAdd = document.getElementById("mAdd");

let page = 0;
let currentProduct = null;

const images = {
  Bangles: "ORG_PIC1.jpeg",
  Necklace: "ORG_PIC2.jpeg",
  Earrings: "ORG_PIC3.jpeg"
};

/* CART FUNCTIONS */
function updateCart(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  cartCountEl.innerText = cart.reduce((s,i)=>s+i.qty,0);
}

function addToCart(name, price){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let item = cart.find(i=>i.name===name);
  item ? item.qty++ : cart.push({name, price, qty:1});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

/* CREATE PRODUCT CARD */
function createCard(type, i){
  const name = `${type} Organizer ${page*6+i+1}`;
  const price = Math.floor(Math.random()*4000)+1500;

  const card = document.createElement("div");
  card.className = "card";
  card.dataset.type = type;

  card.innerHTML = `
    <span class="tag">NEW</span>
    <i class="fa-regular fa-heart wishlist"></i>
    <img src="${images[type]}">
    <div class="quick"><button>Quick View</button></div>
    <div class="info">
      <h4>${name}</h4>
      <div class="price">₹${price}</div>
      <button>Add to Cart</button>
    </div>
  `;

  card.querySelector(".wishlist").onclick = e =>
    e.target.classList.toggle("active");

  card.querySelector(".info button").onclick = () =>
    addToCart(name, price);

  card.querySelector(".quick button").onclick = () => {
    currentProduct = {name, price};
    mImg.src = images[type];
    mTitle.innerText = name;
    mPrice.innerText = "₹" + price;
    modal.style.display = "flex";
  };

  productsEl.appendChild(card);
}

/* LOAD PRODUCTS */
function loadProducts(){
  ["Bangles","Necklace","Earrings"].forEach((t,i)=>createCard(t,i));
  page++;
}

/* MODAL ADD + REDIRECT */
mAdd.onclick = () => {
  addToCart(currentProduct.name, currentProduct.price);
  modal.style.display = "none";
  window.location.href = "cart.html";
};

/* FILTER */
document.querySelectorAll(".filter input").forEach(cb=>{
  cb.onchange = () => {
    const active = [...document.querySelectorAll(".filter input:checked")].map(i=>i.value);
    document.querySelectorAll(".card").forEach(c=>{
      c.style.display = active.includes(c.dataset.type) ? "block" : "none";
    });
  };
});

/* INIT */
loadProducts();
updateCart();
document.getElementById("loadMore").onclick = loadProducts;
</script>

</body>
</html>
